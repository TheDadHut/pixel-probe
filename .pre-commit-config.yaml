repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=500"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        # Match `make lint` and CI: `mypy src` reads the config
        # (packages = ["pixel_probe"]) and ignores tests/scripts.
        # pass_filenames: false → we don't pass per-file paths, so mypy doesn't
        # try to check test files against an env without pytest/Pillow stubs.
        pass_filenames: false
        args: [--config-file=pyproject.toml, src]
        additional_dependencies:
          - Pillow
          - PySide6
          - types-defusedxml
