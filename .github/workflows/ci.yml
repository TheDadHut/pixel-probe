name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: ruff (lint)
        run: ruff check src tests
      - name: ruff (format check)
        run: ruff format --check src tests
      - name: mypy
        run: mypy src

  test:
    name: Test (Python ${{ matrix.python-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      checks: write          # publish-unit-test-result-action creates check runs
      pull-requests: write   # ...and posts a PR comment with results
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.14"]
        os: [ubuntu-latest, windows-latest]   # macOS rejected — see PLAN.md §1.E4
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      # PySide6 needs Qt system libs to import even before any GUI test runs —
      # pytest-qt's pytest_configure imports QtGui, which transitively loads
      # libEGL/libGL. Windows wheels bundle these as DLLs; macOS likewise.
      # Bare Linux runners need them installed at the OS level.
      - name: Install Qt system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libegl1 \
            libgl1 \
            libxkbcommon0 \
            libdbus-1-3

      - run: pip install -e ".[dev]"

      - name: Run tests with coverage
        # Force bash so `\` line continuation works on Windows too
        # (default Windows shell is PowerShell, which uses backticks).
        shell: bash
        run: |
          pytest -m "not gui" \
            --cov=src/pixel_probe \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-fail-under=75 \
            --junit-xml=junit.xml

      - name: Upload coverage HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-py${{ matrix.python-version }}-${{ matrix.os }}
          path: htmlcov/
          retention-days: 14

      - name: Upload JUnit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-py${{ matrix.python-version }}-${{ matrix.os }}
          path: junit.xml
          retention-days: 14

      - name: Publish test results
        if: always() && matrix.os == 'ubuntu-latest'
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: junit.xml
          check_name: Test results (Python ${{ matrix.python-version }})

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.14' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
